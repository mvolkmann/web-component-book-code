<!doctype html>
<html lang="en">
  <head>
    <style>
      radio-group {
        --border-color: cornflowerblue;
        --direction: column;
        --gap: 0;
        --legend-color: blue;
        margin-bottom: 0.5rem;
      }
    </style>
    <script src="hello-world.ts" type="module"></script>
    <script src="radio-group.ts" type="module"></script>
    <script type="module">
      const radioGroup = document.querySelector("radio-group");
      radioGroup.addEventListener("value-changed", (event) => {
        const { name, value } = event.detail;
        if (name === "value") {
          const elements = document.querySelectorAll("hello-world");
          for (const element of elements) {
            element.style.color = value;
          }
        }
      });
    </script>
  </head>
  <body>
    <hello-world></hello-world>
    <hello-world name="Mark"></hello-world>
    <form method="post" action="https://httpbin.org/post">
      <radio-group
        name="color"
        labels="Red,Green,Blue"
        legend="Color"
        value="red"
        values="red,green,blue"
      >
        <div slot="before">Select a color for your new car.</div>
        <div slot="after">Don't choose a color you will regret.</div>
      </radio-group>
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>

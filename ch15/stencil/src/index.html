<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Stencil Traffic Light</title>
    <style>
      :root {
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: #f8fafc;
        background:
          radial-gradient(
            circle at top,
            rgb(56 189 248 / 0.28),
            transparent 42%
          ),
          linear-gradient(180deg, #08111f 0%, #132238 48%, #0f172a 100%);
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        display: grid;
        gap: 1.25rem;
        justify-items: center;
        padding: 2.5rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 3.75rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .panel {
        display: grid;
        gap: 0.75rem;
        justify-items: center;
        padding: 2rem 2.5rem;
        border: 1px solid rgb(148 163 184 / 0.25);
        border-radius: 28px;
        background: rgb(15 23 42 / 0.72);
        box-shadow: 0 20px 60px rgb(0 0 0 / 0.35);
      }

      p {
        margin: 0;
        color: #cbd5e1;
        font-size: 1rem;
      }

      #status {
        min-width: 10ch;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #f8fafc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Traffic Light</h1>
      <section class="panel" aria-label="Traffic light demo">
        <traffic-light id="traffic-light" state="stop"></traffic-light>
        <p>State: <span id="status">Stop</span></p>
        <p>Sequence: stop for 3s, go for 2s, yield for 1s, then repeat.</p>
      </section>
    </main>
    <script src="/build/trafficlight.esm.js" type="module"></script>
    <script nomodule src="/build/trafficlight.js"></script>
    <script>
      const trafficLight = document.querySelector("#traffic-light");
      const status = document.querySelector("#status");
      const cycle = [
        { state: "go", delay: 3000 },
        { state: "yield", delay: 2000 },
        { state: "stop", delay: 1000 },
      ];

      const setState = (state) => {
        trafficLight.state = state;
        status.textContent = state;
      };

      let cycleIndex = 0;

      const advance = () => {
        const step = cycle[cycleIndex];
        cycleIndex = (cycleIndex + 1) % cycle.length;
        window.setTimeout(() => {
          setState(step.state);
          advance();
        }, step.delay);
      };

      setState("stop");
      advance();
    </script>
  </body>
</html>

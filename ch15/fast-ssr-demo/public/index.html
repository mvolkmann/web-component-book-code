<!doctype html>
<html lang="en">
  <head>
    <title>FAST SSR Demo</title>
    <script type="importmap">
      {
        "imports": { "@microsoft/fast-element": "/fast-element.min.js" }
      }
    </script>
    <script type="module" src="/hello-world.js"></script>
    <script type="module">
      // Listen for Greet button clicks.
      const button = document.querySelector("button");
      button.addEventListener("click", async () => {
        // Get HTML from the greet endpoint.
        const res = await fetch("/greet?name=SSR");
        const html = await res.text();
        // Insert the HTML after the Greet button.
        button.insertAdjacentHTML("afterend", html);
      });
    </script>
  </head>
  <body>
    <p>The following components are client-side rendered:</p>
    <hello-world></hello-world>
    <hello-world name="CSR"></hello-world>

    <button>Greet</button>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <title>FAST SSR Demo</title>
    <script type="importmap">
      {
        "imports": {
          "@microsoft/fast-element": "https://cdn.jsdelivr.net/npm/@microsoft/fast-element/dist/fast-element.min.js"
        }
      }
    </script>
    <script type="module" src="/hello-world.js"></script>
    <script type="module">
      // Listen for Greet button clicks.
      const button = document.querySelector("button");
      button.addEventListener("click", async () => {
        // Get HTML from the greet endpoint.
        const res = await fetch("/greet?name=Mark");
        const html = await res.text();
        // Insert the HTML in the div that follows the button.
        const div = document.getElementById("greetings");
        div.setHTMLUnsafe(html);
      });
    </script>
  </head>
  <body>
    <p>The following components are client-side rendered:</p>
    <hello-world></hello-world>
    <hello-world name="Mark"></hello-world>

    <button>Greet</button>
    <div id="greetings"></div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traffic Light Cycle</title>
    <script src="./src/traffic-light.js" type="module"></script>
    <script src="./src/app.js" type="module"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f2f2f2 0%, #d7d7d7 100%);
        font-family: sans-serif;
      }

      main {
        display: grid;
        gap: 1rem;
        justify-items: center;
      }

      p {
        margin: 0;
        color: #202020;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <traffic-light state="stop"></traffic-light>
      <p>The light cycles automatically: stop, go, yield, stop.</p>
    </main>
  </body>
</html>

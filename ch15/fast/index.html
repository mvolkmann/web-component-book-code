<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAST Traffic Light App</title>
    <script src="./traffic-light.js" type="module"></script>
    <script src="./app.js" type="module"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(
          circle at top,
          #f8fbff 0%,
          #e8eef5 42%,
          #d6dde7 100%
        );
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 1.25rem;
        justify-items: center;
        padding: 2rem 2.5rem;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow:
          0 18px 45px rgba(26, 39, 56, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
        color: #17212b;
      }

      p {
        margin: 0;
        text-align: center;
        color: #44515e;
      }

      .state {
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #243241;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Traffic Signal Cycle</h1>
      <traffic-light id="trafficLight" state="stop"></traffic-light>
      <p id="stateLabel" class="state">Current state: stop</p>
      <p>The light starts on stop, then loops through go, yield, and stop.</p>
    </main>
  </body>
</html>

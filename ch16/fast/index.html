<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAST Traffic Light</title>
    <script type="module" src="./traffic-light.js"></script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f5f5;
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 1rem;
        justify-items: center;
      }

      p {
        margin: 0;
        color: #444;
      }
    </style>
  </head>
  <body>
    <main>
      <traffic-light state="stop"></traffic-light>
      <p>Click the light or press Enter/Space to advance its state.</p>
    </main>
  </body>
</html>

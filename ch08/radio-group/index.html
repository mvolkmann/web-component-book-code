<!doctype html>
<html lang="en">
  <head>
    <script src="./radio-group.ts" type="module"></script>
    <script type="module">
      const rg = document.querySelector("radio-group");
      rg.addEventListener("value-change", (e) => {
        const { oldValue, value } = e.detail;
        console.log(`changed from ${oldValue} to ${value}`);
      });
    </script>
  </head>
  <body>
    <radio-group
      name="color"
      labels="Red,Green,Blue"
      legend="Color"
      value="red"
      values="red,green,blue"
    >
      <div slot="before">Select a color for your new car.</div>
      <div slot="after">Don't choose a color you will regret.</div>
    </radio-group>
  </body>
</html>
